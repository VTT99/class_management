<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Center Management</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tutorial Center</h1>
            <span id="health-badge" class="badge badge-muted" title="API health">checking...</span>
        </header>

        <nav role="tablist" aria-label="Sections">
            <button type="button" role="tab" data-page="studentPage" aria-selected="true">Student</button>
            <button type="button" role="tab" data-page="calendarPage" aria-selected="false">Calendar</button>
        </nav>

        <!-- === Student tab === -->
        <section id="studentPage" class="page active" role="tabpanel">
            <div class="form-row" style="justify-content: space-between;">
                <div class="form-row" style="flex: 1; min-width: 240px;">
                    <input type="text" id="studentSearchInput" placeholder="Search by ID or name..." autocomplete="off" style="flex: 1;">
                    <a id="csvExportLink" class="link hidden" href="#" download>Export CSV</a>
                </div>
                <button type="button" id="openAddStudentBtn">+ Add Student</button>
            </div>
            <div id="studentSearchResults" class="result-block"></div>
            <div id="studentInfo" class="result-block"></div>
            <div id="courseTabs" class="course-tabs"></div>
            <div id="lessonDetails"></div>
        </section>

        <!-- === Calendar tab === -->
        <section id="calendarPage" class="page" role="tabpanel" hidden>
            <div class="form-row" style="justify-content: space-between;">
                <div class="form-row">
                    <div class="view-toggle" role="group" aria-label="Calendar view">
                        <button type="button" data-view="week" class="active">Week</button>
                        <button type="button" data-view="month">Month</button>
                    </div>
                    <button type="button" id="calendarPrevBtn" class="btn-secondary">◀</button>
                    <span id="calendarRangeLabel"></span>
                    <button type="button" id="calendarNextBtn" class="btn-secondary">▶</button>
                    <button type="button" id="calendarTodayBtn" class="btn-secondary">Today</button>
                </div>
                <div class="form-row">
                    <button type="button" id="openAddClassBtn">+ Add Class</button>
                    <button type="button" id="syncCalendarBtn" class="btn-secondary" title="Push lessons to Google Calendar">Sync GCal</button>
                    <button type="button" id="uploadSheetsBtn" class="btn-secondary" title="Push the local DB back to the Google Sheet">Upload DB → Sheets</button>
                </div>
            </div>
            <div id="calendarWeekGrid" class="week-grid"></div>
            <div id="calendarMonthGrid" class="month-grid" hidden></div>
        </section>
    </div>

    <!-- === Modal: Add Student === -->
    <dialog id="addStudentDialog" class="modal">
        <form id="addStudentForm" method="dialog">
            <h3>Add New Student</h3>
            <label>Name<input type="text" name="name" required maxlength="200"></label>
            <label>Parent contact<input type="text" name="parent_contact" required maxlength="200"></label>
            <label>Gender
                <select name="gender" required>
                    <option value="F">Female</option>
                    <option value="M">Male</option>
                    <option value="Other">Other</option>
                </select>
            </label>
            <label>Payment method<input type="text" name="payment_method" required></label>
            <label>Referee (optional)<input type="text" name="referee"></label>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" data-close-modal>Cancel</button>
                <button type="submit">Add Student</button>
            </div>
        </form>
    </dialog>

    <!-- === Modal: Add Class (lesson) === -->
    <dialog id="addClassDialog" class="modal">
        <form id="addClassForm" method="dialog">
            <h3>Add Class</h3>

            <label>Course
                <select id="addClassCourseSelect" required></select>
            </label>

            <label>Type
                <select id="addClassType" required>
                    <option value="single">Single class</option>
                    <option value="weekly">Weekly recurring (one or more days)</option>
                    <option value="daily">Daily</option>
                </select>
            </label>

            <!-- "Single" + "Daily" use these direct fields. -->
            <div id="addClassSimpleFields">
                <label>Date<input type="date" id="addClassDate"></label>
                <div class="form-row">
                    <label style="flex:1;">Start time<input type="time" id="addClassStart"></label>
                    <label style="flex:1;">End time<input type="time" id="addClassEnd"></label>
                </div>
            </div>

            <!-- "Weekly" uses these instead. -->
            <div id="addClassWeeklyFields" hidden>
                <label>Start week (any date in it)
                    <input type="date" id="addClassWeekStart">
                </label>
                <div id="addClassDaysList"></div>
                <button type="button" id="addClassAddDayBtn" class="btn-secondary" style="margin-top: 4px;">+ Add day</button>
            </div>

            <label id="addClassDurationRow" hidden>
                Number of <span id="addClassDurationUnit">weeks</span>
                <input type="number" id="addClassDuration" min="1" max="104" value="6">
            </label>

            <p id="addClassPreview" class="muted" style="margin: 10px 0 0;"></p>

            <div class="modal-actions">
                <button type="button" class="btn-secondary" data-close-modal>Cancel</button>
                <button type="submit">Create</button>
            </div>
        </form>
    </dialog>

    <!-- === Modal: Lesson details (attendance + add student) === -->
    <dialog id="lessonDialog" class="modal modal-wide">
        <h3 id="lessonDialogTitle">Lesson</h3>
        <p id="lessonDialogSubtitle" class="muted"></p>

        <h4>Participants</h4>
        <div id="lessonParticipants" class="participant-list">
            <p class="empty-state">No students registered yet.</p>
        </div>
        <div class="form-row">
            <button type="button" id="markAllAttendedBtn">Mark selected as attended</button>
            <label class="inline-check" style="margin: 0;">
                <input type="checkbox" id="pushAbsentCheck" checked>
                Push absentees to next class
            </label>
        </div>
        <div id="pushedReport" class="result-block" hidden></div>

        <hr>

        <h4>Add student to this class</h4>
        <div class="form-row">
            <input type="text" id="lessonAddStudentInput" placeholder="Search students by ID or name..." autocomplete="off" style="flex: 1;">
        </div>
        <div id="lessonAddStudentResults" class="result-block"></div>

        <div class="modal-actions" style="margin-top: 16px;">
            <button type="button" class="btn-secondary" data-close-modal>Close</button>
        </div>
    </dialog>

    <div id="toast-stack" aria-live="polite"></div>

    <script src="config.js"></script>
    <script src="static/js/app.js" defer></script>
</body>
</html>
